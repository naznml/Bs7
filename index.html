<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Махмутова Л.Г. Бастауыш мектепте математиканы оқыту әдістемесі</title>
  <style>
  :root{
    --bg:#f3f6fb;
    --card:#ffffff;
    --text:#172033;
    --muted:#64748b;
    --blue:#2563eb;
    --blue-dark:#1d4ed8;
    --line:#e5e7eb;
    --green:#16a34a;
    --green-bg:#dcfce7;
    --red:#dc2626;
    --red-bg:#fef2f2;
    --shadow:0 10px 30px rgba(15,23,42,.08);
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:linear-gradient(180deg,#eef4ff 0%,#f8fafc 45%,#f3f6fb 100%);
    color:var(--text);
    line-height:1.6;
  }

  header{
    padding:30px 16px 24px;
    background:linear-gradient(135deg,#1d4ed8,#2563eb,#38bdf8);
    color:white;
  }

  .wrap{max-width:1050px;margin:0 auto}

  h1{
    font-size:25px;
    line-height:1.25;
    margin:0 0 8px;
    letter-spacing:-.3px;
  }

  .lead{margin:0;color:rgba(255,255,255,.9);font-size:15px}

  main{padding:18px 14px 70px}

  #sectionButtons{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:10px;
    margin:0 0 18px;
  }

  .section-btn{
    text-align:left;
    border:1px solid var(--line);
    border-radius:16px;
    padding:12px 13px;
    background:white;
    color:#1f2937;
    font-weight:800;
    box-shadow:0 4px 14px rgba(15,23,42,.05);
    cursor:pointer;
    transition:.18s ease;
  }

  .section-btn:hover{transform:translateY(-1px);border-color:#93c5fd}

  .section-btn.active{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
    border-color:var(--blue);
    box-shadow:0 10px 22px rgba(37,99,235,.25);
  }

  .topic-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:20px;
    margin:0 0 18px;
    box-shadow:var(--shadow);
  }

  .topic-card h2{margin:0 0 10px;font-size:22px;line-height:1.3}
  .topic-card p{margin:0;color:var(--muted);font-size:15px}

  .questions{display:grid;gap:16px}

  .question-card{
    background:white;
    border:1px solid var(--line);
    border-radius:22px;
    padding:18px;
    box-shadow:var(--shadow);
  }

  .question-top{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}

  .q-number{
    width:30px;
    height:30px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:999px;
    background:#eff6ff;
    color:#1d4ed8;
    font-weight:900;
  }

  .q-type,.q-kt{
    display:inline-flex;
    align-items:center;
    border-radius:999px;
    padding:5px 9px;
    font-size:12px;
    font-weight:900;
  }

  .q-type{background:#f1f5f9;color:#475569}
  .q-kt{background:#ecfeff;color:#0e7490}

  .question-card h3{margin:0 0 12px;font-size:17px;line-height:1.45}

  .options{display:grid;gap:8px}

  label.option{
    display:flex;
    gap:10px;
    align-items:flex-start;
    padding:12px;
    border:1px solid var(--line);
    border-radius:15px;
    background:#f8fafc;
    cursor:pointer;
    transition:.15s ease;
  }

  label.option:hover{background:#f1f5f9;border-color:#bfdbfe}
  label.option input{margin-top:4px;transform:scale(1.1)}
  label.option.correct{border-color:#86efac;background:var(--green-bg)}
  label.option.wrong{border-color:#fecaca;background:var(--red-bg)}

  .explanation{
    display:none;
    margin-top:12px;
    padding:12px 14px;
    border-left:4px solid var(--blue);
    background:#eff6ff;
    border-radius:14px;
    color:#1e3a8a;
    font-size:14px;
  }

  .explanation .ok{color:var(--green);font-weight:900;margin-bottom:4px}
  .explanation .bad{color:var(--red);font-weight:900;margin-bottom:4px}

  .result-actions{margin:22px 0 0;display:flex;flex-wrap:wrap;gap:12px;align-items:center}

  .result-btn,button{
    border:0;
    border-radius:15px;
    padding:12px 16px;
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));
    color:white;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 10px 20px rgba(37,99,235,.22);
  }

  .section-result{
    display:none;
    background:white;
    border:1px solid var(--line);
    border-radius:15px;
    padding:11px 14px;
    font-weight:900;
    color:#1f2937;
    box-shadow:0 6px 16px rgba(15,23,42,.06);
  }

  @media(max-width:640px){
    header{padding:22px 14px}
    h1{font-size:20px}
    main{padding:14px 10px 60px}
    #sectionButtons{grid-template-columns:1fr}
    .topic-card,.question-card{border-radius:18px;padding:15px}
    .question-card h3{font-size:16px}
    label.option{padding:11px}
  }
</style>
</head>

    let currentSectionId = sections[0]?.id || null;
    const answers = {};
    const checkedSections = {};

    function renderSectionButtons() {
      const box = document.getElementById("sectionButtons");
      if (!box) return;

      box.innerHTML = sections.map((s, index) => `
        <button class="section-btn ${s.id === currentSectionId ? "active" : ""}" onclick="openSection('${s.id}')">
          ${index + 1}. ${s.title.replace(/^\d+-тақырып\.\s*/, "")}
        </button>
      `).join("");
    }

    function openSection(id) {
      currentSectionId = id;
      renderSectionButtons();
      renderCurrentSection();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderCurrentSection() {
      const section = sections.find(s => s.id === currentSectionId);
      const app = document.getElementById("quizApp");
      if (!section || !app) return;

      app.innerHTML = `
        <section class="topic-card">
          <h2>${section.title}</h2>
          <p>${section.intro}</p>
        </section>

        <div class="questions">
          ${section.questions.map((q, qIndex) => renderQuestion(section.id, q, qIndex)).join("")}
        </div>

        <div class="result-actions">
          <button class="result-btn" type="button" onclick="checkSection('${section.id}')">Нәтижені көрсету</button>
          <div id="result-${section.id}" class="section-result"></div>
        </div>
      `;
      if (checkedSections[section.id]) {
        showCheckedSection(section.id);
      }
    }

    function renderQuestion(sectionId, q, qIndex) {
      const name = `${sectionId}-q-${qIndex}`;
      const typeLabel = q.type === "multiple" ? "Бірнеше дұрыс жауап" : "Бір дұрыс жауап";

      return `
        <div class="question-card" id="${name}">
          <div class="question-top">
            <span class="q-number">${qIndex + 1}</span>
            <span class="q-type">${typeLabel}</span>
            <span class="q-kt">${q.kt || ""}</span>
          </div>

          <h3>${q.question}</h3>

          <div class="options">
            ${q.options.map((opt, optIndex) => `
              <label class="option" data-option="${optIndex}">
                <input
                  type="${q.type === "multiple" ? "checkbox" : "radio"}"
                  name="${name}"
                  value="${optIndex}"
                  onchange="saveAnswer('${sectionId}', ${qIndex})"
                >
                <span>${opt}</span>
              </label>
            `).join("")}
          </div>

          <div class="explanation" id="explanation-${name}"></div>
        </div>
      `;
    }

    function saveAnswer(sectionId, qIndex) {
      const section = sections.find(s => s.id === sectionId);
      if (!section) return;

      const name = `${sectionId}-q-${qIndex}`;
      const checked = [...document.querySelectorAll(`input[name="${name}"]:checked`)]
        .map(input => Number(input.value));

      if (!answers[sectionId]) answers[sectionId] = {};
      answers[sectionId][qIndex] = checked;

      checkedSections[sectionId] = false;
      clearSectionMarks(sectionId);
      hideSectionResult(sectionId);
    }

    function arraysEqual(a, b) {
      if (!Array.isArray(a) || !Array.isArray(b)) return false;
      if (a.length !== b.length) return false;
      const x = [...a].sort((m, n) => m - n);
      const y = [...b].sort((m, n) => m - n);
      return x.every((v, i) => v === y[i]);
    }

    function isAnswered(userAnswer) {
      return Array.isArray(userAnswer) && userAnswer.length > 0;
    }

    function clearQuestionMark(sectionId, qIndex) {
      const name = `${sectionId}-q-${qIndex}`;
      const card = document.getElementById(name);
      if (!card) return;

      card.querySelectorAll(".option").forEach(label => {
        label.classList.remove("correct", "wrong");
      });

      const explanation = document.getElementById(`explanation-${name}`);
      if (explanation) {
        explanation.innerHTML = "";
        explanation.style.display = "none";
      }
    }

    function clearSectionMarks(sectionId) {
      const section = sections.find(s => s.id === sectionId);
      if (!section) return;
      section.questions.forEach((q, qIndex) => clearQuestionMark(sectionId, qIndex));
    }

    function hideSectionResult(sectionId) {
      const resultBox = document.getElementById(`result-${sectionId}`);
      if (resultBox) {
        resultBox.innerHTML = "";
        resultBox.style.display = "none";
      }
      const floatingScore = document.getElementById("floatingScore");
      if (floatingScore) {
        floatingScore.innerHTML = "Тексерілмеді";
      }
    }

    function checkSection(sectionId) {
      checkedSections[sectionId] = true;
      showCheckedSection(sectionId);
      const resultBox = document.getElementById(`result-${sectionId}`);
      if (resultBox) {
        resultBox.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    function showCheckedSection(sectionId) {
      const section = sections.find(s => s.id === sectionId);
      if (!section) return;

      section.questions.forEach((q, qIndex) => {
        if (!answers[sectionId]) answers[sectionId] = {};
        if (!Array.isArray(answers[sectionId][qIndex])) {
          answers[sectionId][qIndex] = [];
        }
        markQuestion(sectionId, qIndex, true);
      });

      updateSectionResult(sectionId);
    }

    function markQuestion(sectionId, qIndex, forceShow = false) {
      const section = sections.find(s => s.id === sectionId);
      if (!section) return;

      const q = section.questions[qIndex];
      const name = `${sectionId}-q-${qIndex}`;
      const userAnswer = answers[sectionId]?.[qIndex] || [];
      const answered = isAnswered(userAnswer);
      const isCorrect = arraysEqual(userAnswer, q.answer);
      const card = document.getElementById(name);
      if (!card) return;
      if (!answered && !forceShow) return;

      const labels = card.querySelectorAll(".option");
      labels.forEach(label => {
        const optIndex = Number(label.dataset.option);
        label.classList.remove("correct", "wrong");

        if (q.answer.includes(optIndex)) {
          label.classList.add("correct");
        }

        if (userAnswer.includes(optIndex) && !q.answer.includes(optIndex)) {
          label.classList.add("wrong");
        }
      });

      const explanation = document.getElementById(`explanation-${name}`);
      if (explanation) {
        explanation.innerHTML = `
          <div class="${isCorrect ? "ok" : "bad"}">
            ${isCorrect ? "Дұрыс жауап!" : (answered ? "Қате жауап." : "Жауап таңдалмады.")}
          </div>
          <p>${q.explanation}</p>
        `;
        explanation.style.display = "block";
      }
    }

    function updateSectionResult(sectionId) {
      const section = sections.find(s => s.id === sectionId);
      if (!section) return;

      let correctCount = 0;
      let answeredCount = 0;

      section.questions.forEach((q, qIndex) => {
        const userAnswer = answers[sectionId]?.[qIndex] || [];
        if (isAnswered(userAnswer)) answeredCount++;
        if (arraysEqual(userAnswer, q.answer)) correctCount++;
      });

      const scoreText = `${correctCount} / ${section.questions.length}`;
      const resultBox = document.getElementById(`result-${sectionId}`);
      if (resultBox) {
        resultBox.innerHTML = `
          <strong>Нәтиже:</strong> ${scoreText}
          <small>Жауап берілгені: ${answeredCount} / ${section.questions.length}</small>
        `;
        resultBox.style.display = "block";
      }

      const floatingScore = document.getElementById("floatingScore");
      if (floatingScore) {
        floatingScore.innerHTML = `Балл: ${scoreText}<br><small>${answeredCount} жауап</small>`;
      }
    }

    function scrollToTopQuick() {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function scrollToTestsQuick() {
      const questions = document.querySelector(".questions");
      if (questions) {
        questions.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    renderSectionButtons();
    renderCurrentSection();
  </script>
</body>
</html>
